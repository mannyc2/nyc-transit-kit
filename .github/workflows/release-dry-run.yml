name: Release Plan

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out nyc-transit-kit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm with trusted publishing support
        run: npm install -g npm@11.17.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Run release checks
        run: |
          bun run release:version:check
          bun run check
          bun run build:cli
          bun run release:prepare:npm
          bun run check:npm-stage
          bun run check:release-config

      - name: Validate with ts-release
        uses: mannyc2/ts-release/apps/ts-release-action@aa452f38ca07d1fa6d439f2bbe89d9852806ee42
        with:
          command: validate
          config: release.config.json
          write-step-summary: "true"

      - name: Record release plan
        uses: mannyc2/ts-release/apps/ts-release-action@aa452f38ca07d1fa6d439f2bbe89d9852806ee42
        with:
          command: plan
          config: release.config.json
          format: markdown
          write-step-summary: "true"
          plan-path: .release/evidence/release-plan.md

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-plan-evidence
          path: |
            .release/evidence
            .release/artifacts
            dist
          if-no-files-found: warn
