name: Release

on:
  workflow_dispatch:
    inputs:
      approve_irreversible:
        description: Publish npm packages and create the GitHub release.
        type: boolean
        required: true
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out nyc-transit-kit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm with trusted publishing support
        run: npm install -g npm@11.17.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Require trusted publishing release config
        run: |
          bun -e '
            const config = await Bun.file("release.config.json").json()
            const tokenTargets = config.targets.filter((target) =>
              target._tag === "NpmRegistryTarget" && target.trustedPublishing === undefined
            )
            if (tokenTargets.length > 0) {
              console.error("release.yml requires trustedPublishing npm targets.")
              console.error("Configure npm trust, then run bun run release:trust-publishing.")
              console.error(`Still token-backed: ${tokenTargets.map((target) => target.id).join(", ")}`)
              process.exit(1)
            }
          '

      - run: bun install --frozen-lockfile
      - run: bun run check:release-local

      - name: Validate release plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun run release:validate

      - name: Publish release
        if: ${{ inputs.approve_irreversible }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun run release:run --execute --approve-irreversible

      - name: Refuse unapproved publish
        if: ${{ !inputs.approve_irreversible }}
        run: |
          echo "Set approve_irreversible=true to publish."
          exit 1

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-evidence
          path: |
            .release/evidence
            .release/artifacts
            dist
          if-no-files-found: warn
